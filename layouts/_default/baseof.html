<!doctype html>
<html lang="{{ site.Language.Locale | default "zh-cn" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  </head>
  <body>
    <div class="bg-scene" aria-hidden="true">
      <div class="bg-image"></div>
      <div class="bg-vignette"></div>
      <div class="sparkles"></div>
    </div>

    <header class="site-header">
      <a class="brand" href="{{ "/" | relURL }}">
        <span class="brand-mark"></span>
        <span>{{ site.Title }}</span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        {{ range site.Menus.main }}
          <a href="{{ .URL | relURL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
      <button class="theme-toggle" type="button" aria-label="切换明暗模式" data-theme-toggle>☾</button>
    </header>

    <main>
      {{ block "main" . }}{{ end }}
    </main>

    <footer class="site-footer">
      <span>© {{ now.Format "2006" }} {{ site.Params.author }}</span>
      <span>Built with Hugo</span>
    </footer>

    <script src="{{ "js/main.js" | relURL }}"></script>
  </body>
</html>
